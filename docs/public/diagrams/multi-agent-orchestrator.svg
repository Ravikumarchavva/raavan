<svg width="1400" height="800" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#374151"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="38" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">OrchestratorAgent Architecture</text>
  <text x="700" y="60" font-size="13" fill="#64748b" text-anchor="middle">Hub-and-Spoke Pattern · Orchestrator routes tasks to specialised sub-agents</text>

  <!-- ── TOP ROW: Skills ─ Observability ─ Evals ── -->
  <!-- Skills -->
  <g filter="url(#shadow)">
    <rect x="295" y="82" width="160" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="375" y="122" font-size="28" text-anchor="middle">📚</text>
  <text x="375" y="145" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Skills</text>
  <text x="375" y="161" font-size="10" fill="#64748b" text-anchor="middle">(MCP &amp; Built-In Skills)</text>

  <!-- Observability -->
  <g filter="url(#shadow)">
    <rect x="620" y="82" width="160" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="700" y="122" font-size="28" text-anchor="middle">⚙️</text>
  <text x="700" y="145" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Observability</text>
  <text x="700" y="161" font-size="10" fill="#64748b" text-anchor="middle">(Traces | Metrics | Logs)</text>

  <!-- Evals -->
  <g filter="url(#shadow)">
    <rect x="945" y="82" width="160" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="1025" y="122" font-size="28" text-anchor="middle">📊</text>
  <text x="1025" y="145" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Evals</text>
  <text x="1025" y="161" font-size="10" fill="#64748b" text-anchor="middle">(Criteria, Judge, Report)</text>

  <!-- Arrows: top boxes → Orchestrator -->
  <line x1="375" y1="172" x2="630" y2="272" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <line x1="700" y1="172" x2="700" y2="272" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <line x1="1025" y1="172" x2="770" y2="272" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>

  <!-- ── MAIN BOUNDARY BOX ── -->
  <rect x="240" y="215" width="920" height="445" rx="20" fill="rgba(241,245,249,0.5)" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="254" y="232" font-size="10" fill="#94a3b8">Multi-Agent System Boundary</text>

  <!-- ── ORCHESTRATOR AGENT ── -->
  <g filter="url(#shadow)">
    <rect x="545" y="242" width="310" height="130" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  </g>
  <rect x="545" y="242" width="310" height="38" rx="16" fill="#3b82f6"/>
  <rect x="545" y="262" width="310" height="18" fill="#3b82f6"/>
  <text x="700" y="267" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">OrchestratorAgent</text>
  <text x="700" y="315" font-size="34" text-anchor="middle">🤖</text>
  <text x="700" y="345" font-size="11" fill="#1e40af" text-anchor="middle">(Routes &amp; Coordinates Sub-Agents)</text>
  <text x="700" y="362" font-size="10" fill="#6366f1" text-anchor="middle">model_context: UnboundedContext</text>

  <!-- Arrows: Orchestrator → sub-agents (solid, dispatch) -->
  <line x1="608" y1="378" x2="438" y2="465" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="378" x2="700" y2="465" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="792" y1="378" x2="962" y2="465" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Return arrows: sub-agents → Orchestrator (dashed) -->
  <path d="M400,465 Q365,415 545,385" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <path d="M700,465 Q718,425 700,385" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <path d="M1000,465 Q1035,415 855,385" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>

  <!-- ── SUB-AGENT 1: Researcher ── -->
  <g filter="url(#shadow)">
    <rect x="268" y="465" width="228" height="170" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  </g>
  <rect x="268" y="465" width="228" height="36" rx="14" fill="#22c55e"/>
  <rect x="268" y="483" width="228" height="18" fill="#22c55e"/>
  <text x="382" y="488" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">RESEARCHER</text>
  <text x="382" y="538" font-size="30" text-anchor="middle">🔍</text>
  <text x="382" y="562" font-size="11" fill="#15803d" text-anchor="middle">ReActAgent</text>
  <text x="382" y="578" font-size="10" fill="#16a34a" text-anchor="middle">SlidingWindowContext(20)</text>
  <rect x="284" y="590" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="329" y="607" font-size="10" fill="#166534" text-anchor="middle">🔧 Tools</text>
  <rect x="386" y="590" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="431" y="607" font-size="10" fill="#166534" text-anchor="middle">🧠 Memory</text>

  <!-- ── SUB-AGENT 2: Writer ── -->
  <g filter="url(#shadow)">
    <rect x="586" y="465" width="228" height="170" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  </g>
  <rect x="586" y="465" width="228" height="36" rx="14" fill="#22c55e"/>
  <rect x="586" y="483" width="228" height="18" fill="#22c55e"/>
  <text x="700" y="488" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">WRITER</text>
  <text x="700" y="538" font-size="30" text-anchor="middle">✍️</text>
  <text x="700" y="562" font-size="11" fill="#15803d" text-anchor="middle">ReActAgent</text>
  <text x="700" y="578" font-size="10" fill="#16a34a" text-anchor="middle">SlidingWindowContext(10)</text>
  <rect x="602" y="590" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="647" y="607" font-size="10" fill="#166534" text-anchor="middle">🔧 Tools</text>
  <rect x="704" y="590" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="749" y="607" font-size="10" fill="#166534" text-anchor="middle">🧠 Memory</text>

  <!-- ── SUB-AGENT 3: Reviewer ── -->
  <g filter="url(#shadow)">
    <rect x="904" y="465" width="228" height="170" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  </g>
  <rect x="904" y="465" width="228" height="36" rx="14" fill="#22c55e"/>
  <rect x="904" y="483" width="228" height="18" fill="#22c55e"/>
  <text x="1018" y="488" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">REVIEWER</text>
  <text x="1018" y="538" font-size="30" text-anchor="middle">✅</text>
  <text x="1018" y="562" font-size="11" fill="#15803d" text-anchor="middle">ReActAgent</text>
  <text x="1018" y="578" font-size="10" fill="#16a34a" text-anchor="middle">SlidingWindowContext(10)</text>
  <rect x="920" y="590" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="965" y="607" font-size="10" fill="#166534" text-anchor="middle">🔧 Tools</text>
  <rect x="1022" y="590" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="1067" y="607" font-size="10" fill="#166534" text-anchor="middle">🧠 Memory</text>

  <!-- ── USER LEFT ── -->
  <circle cx="82" cy="330" r="22" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <circle cx="82" cy="323" r="9" fill="#0284c7"/>
  <path d="M58,357 Q82,342 106,357" fill="#0284c7"/>
  <text x="82" y="390" font-size="12" fill="#374151" text-anchor="middle">User</text>
  <line x1="110" y1="340" x2="143" y2="340" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── INPUT GUARDRAILS ── -->
  <g filter="url(#shadow)">
    <rect x="148" y="292" width="138" height="110" rx="14" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  </g>
  <text x="217" y="330" font-size="28" text-anchor="middle">🛡️</text>
  <text x="217" y="354" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Input Guardrails</text>
  <text x="217" y="370" font-size="9.5" fill="#b91c1c" text-anchor="middle">(Content Filter, PII,</text>
  <text x="217" y="384" font-size="9.5" fill="#b91c1c" text-anchor="middle">Prompt Injection)</text>
  <line x1="286" y1="340" x2="316" y2="340" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── OUTPUT GUARDRAILS ── -->
  <line x1="1160" y1="340" x2="1190" y2="340" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <g filter="url(#shadow)">
    <rect x="1195" y="292" width="138" height="110" rx="14" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  </g>
  <text x="1264" y="330" font-size="28" text-anchor="middle">🛡️</text>
  <text x="1264" y="354" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Output Guardrails</text>
  <text x="1264" y="370" font-size="9.5" fill="#b91c1c" text-anchor="middle">(Content Filter, PII,</text>
  <text x="1264" y="384" font-size="9.5" fill="#b91c1c" text-anchor="middle">LLM Judge)</text>
  <line x1="1333" y1="340" x2="1358" y2="340" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── USER RIGHT ── -->
  <circle cx="1382" cy="330" r="22" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <circle cx="1382" cy="323" r="9" fill="#0284c7"/>
  <path d="M1358,357 Q1382,342 1406,357" fill="#0284c7"/>
  <text x="1382" y="390" font-size="12" fill="#374151" text-anchor="middle">User</text>

  <!-- ── LEGEND ── -->
  <rect x="28" y="710" width="530" height="68" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="293" y="730" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Legend</text>
  <rect x="44" y="740" width="13" height="13" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="62" y="751" font-size="10" fill="#374151">OrchestratorAgent</text>
  <rect x="185" y="740" width="13" height="13" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="203" y="751" font-size="10" fill="#374151">ReActAgent (sub-agent)</text>
  <rect x="370" y="740" width="13" height="13" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="388" y="751" font-size="10" fill="#374151">Guardrails</text>
  <line x1="44" y1="766" x2="82" y2="766" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="87" y="770" font-size="10" fill="#374151">Task dispatch</text>
  <line x1="200" y1="766" x2="238" y2="766" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <text x="243" y="770" font-size="10" fill="#374151">Result return</text>
  <line x1="370" y1="766" x2="408" y2="766" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="413" y="770" font-size="10" fill="#374151">Monitor / observe</text>
</svg>
