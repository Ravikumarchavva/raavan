<svg width="1300" height="580" viewBox="0 0 1300 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1300" height="580" fill="#f8fafc"/>

  <!-- Title -->
  <text x="650" y="38" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">ConditionalFlow Architecture</text>
  <text x="650" y="60" font-size="13" fill="#64748b" text-anchor="middle">Decision Routing Pattern · Predicate function determines which agent branch executes</text>

  <!-- ── INPUT ── -->
  <g filter="url(#shadow)">
    <rect x="30" y="235" width="130" height="90" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  </g>
  <text x="95" y="272" font-size="30" text-anchor="middle">📩</text>
  <text x="95" y="300" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">User Request</text>
  <text x="95" y="315" font-size="9.5" fill="#94a3b8" text-anchor="middle">(any message)</text>

  <!-- Arrow: Input → Condition -->
  <line x1="160" y1="280" x2="225" y2="280" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── CONDITION DIAMOND ── -->
  <g filter="url(#shadow)">
    <polygon points="330,220 440,280 330,340 220,280" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
  </g>
  <text x="330" y="268" font-size="22" text-anchor="middle">🤔</text>
  <text x="330" y="289" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">predicate()</text>
  <text x="330" y="306" font-size="10" fill="#b45309" text-anchor="middle">request type?</text>

  <!-- Label: True branch (top) -->
  <text x="420" y="215" font-size="10.5" font-weight="700" fill="#16a34a">True</text>
  <text x="413" y="229" font-size="9.5" fill="#16a34a">(is_code_task)</text>

  <!-- Label: False branch (bottom) -->
  <text x="412" y="350" font-size="10.5" font-weight="700" fill="#dc2626">False</text>
  <text x="408" y="364" font-size="9.5" fill="#dc2626">(is_general)</text>

  <!-- Arrow: Condition → True branch (top, going right and up) -->
  <path d="M440,280 L480,280 L480,160 L540,160" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Arrow: Condition → False branch (bottom, going right and down) -->
  <path d="M440,280 L480,280 L480,400 L540,400" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- ── TRUE BRANCH: Code Gen Agent ── -->
  <g filter="url(#shadow)">
    <rect x="540" y="80" width="260" height="195" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  </g>
  <rect x="540" y="80" width="260" height="38" rx="14" fill="#22c55e"/>
  <rect x="540" y="100" width="260" height="18" fill="#22c55e"/>
  <text x="670" y="105" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">CODE GENERATION</text>
  <text x="670" y="150" font-size="30" text-anchor="middle">⌨️</text>
  <text x="670" y="179" font-size="11" fill="#15803d" text-anchor="middle">ReActAgent (if_true)</text>
  <text x="670" y="196" font-size="10" fill="#16a34a" text-anchor="middle">Writes code, runs tests</text>
  <text x="670" y="212" font-size="9.5" fill="#22c55e" text-anchor="middle">TokenBudgetContext(8000)</text>
  <rect x="556" y="223" width="58" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="585" y="240" font-size="9.5" fill="#166534" text-anchor="middle">🤖 LLM</text>
  <rect x="626" y="223" width="58" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="240" font-size="9.5" fill="#166534" text-anchor="middle">🔧 Tools</text>
  <rect x="696" y="223" width="90" height="26" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="741" y="240" font-size="9.5" fill="#166534" text-anchor="middle">CodeInterpreter</text>
  <rect x="556" y="255" width="228" height="16" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="267" font-size="9.5" fill="#166534" text-anchor="middle">output → code + test results</text>

  <!-- ── FALSE BRANCH: Parallel Sub-Flow ── -->
  <!-- Dashed boundary for the nested parallel flow -->
  <rect x="534" y="325" width="492" height="230" rx="14" fill="rgba(255,241,242,0.5)" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="780" y="345" font-size="10" fill="#f87171" text-anchor="middle">nested ParallelFlow (if_false)</text>

  <!-- False branch fan-out arrows -->
  <path d="M540,400 L575,400 L575,380 L625,380" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M540,400 L575,400 L575,450 L625,450" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── FALSE AGENT A: QA Agent ── -->
  <g filter="url(#shadow)">
    <rect x="625" y="340" width="230" height="95" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="625" y="340" width="230" height="30" rx="12" fill="#3b82f6"/>
  <rect x="625" y="358" width="230" height="12" fill="#3b82f6"/>
  <text x="740" y="361" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">QA AGENT</text>
  <text x="740" y="393" font-size="22" text-anchor="middle">✅</text>
  <text x="740" y="414" font-size="10" fill="#1e40af" text-anchor="middle">ReActAgent · Answers questions</text>
  <text x="740" y="428" font-size="9.5" fill="#2563eb" text-anchor="middle">SlidingWindowContext(15)</text>

  <!-- ── FALSE AGENT B: Creative Agent ── -->
  <g filter="url(#shadow)">
    <rect x="625" y="457" width="230" height="95" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="625" y="457" width="230" height="30" rx="12" fill="#3b82f6"/>
  <rect x="625" y="475" width="230" height="12" fill="#3b82f6"/>
  <text x="740" y="478" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">CREATIVE AGENT</text>
  <text x="740" y="510" font-size="22" text-anchor="middle">🎨</text>
  <text x="740" y="531" font-size="10" fill="#1e40af" text-anchor="middle">ReActAgent · Creative writing</text>
  <text x="740" y="545" font-size="9.5" fill="#2563eb" text-anchor="middle">SlidingWindowContext(10)</text>

  <!-- False branch merge arrows → Output -->
  <path d="M855,388 L920,388 L920,460" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M855,504 L920,504 L920,470" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- MERGE (false branch) -->
  <g filter="url(#shadow)">
    <rect x="900" y="420" width="120" height="80" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  </g>
  <text x="960" y="452" font-size="18" text-anchor="middle">🔀</text>
  <text x="960" y="473" font-size="10" font-weight="600" fill="#7c3aed" text-anchor="middle">Merge</text>
  <text x="960" y="490" font-size="9" fill="#9333ea" text-anchor="middle">(concat)</text>

  <!-- ── TRUE BRANCH arrow → Output ── -->
  <path d="M800,177 L1060,177 L1060,330" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- False merge → Output -->
  <line x1="1020" y1="460" x2="1060" y2="460" stroke="#ef4444" stroke-width="1.5"/>
  <path d="M1060,460 L1060,370" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- ── OUTPUT ── -->
  <g filter="url(#shadow)">
    <rect x="1030" y="280" width="200" height="95" rx="14" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  </g>
  <text x="1130" y="318" font-size="28" text-anchor="middle">📤</text>
  <text x="1130" y="347" font-size="11" font-weight="600" fill="#713f12" text-anchor="middle">Final Response</text>
  <text x="1130" y="362" font-size="9.5" fill="#92400e" text-anchor="middle">(route-specific output)</text>

  <!-- ── LEGEND ── -->
  <rect x="28" y="540" width="520" height="28" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="44" y="550" width="13" height="13" rx="3" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="62" y="561" font-size="10" fill="#374151">Condition (predicate fn)</text>
  <rect x="186" y="550" width="13" height="13" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="204" y="561" font-size="10" fill="#374151">if_true branch</text>
  <rect x="306" y="550" width="13" height="13" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="324" y="561" font-size="10" fill="#374151">if_false branch (nested parallel)</text>
</svg>
