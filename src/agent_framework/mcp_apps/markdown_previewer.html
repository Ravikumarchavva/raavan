<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Markdown Previewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e5e7eb;min-height:80px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #1f2937}
  .title{font-size:12px;font-weight:600;color:#9ca3af}
  .toggle{display:flex;gap:4px}
  .btn{padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid #374151;background:#1f2937;color:#9ca3af;transition:all .15s}
  .btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
  .preview{padding:14px 16px;line-height:1.65;font-size:13px}
  .source{padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;color:#a5b4fc;background:#0f172a;margin:8px;border-radius:6px;max-height:300px;overflow:auto}
  .preview h1,.preview h2,.preview h3{color:#f3f4f6;margin:12px 0 6px}
  .preview h1{font-size:18px}.preview h2{font-size:15px}.preview h3{font-size:13px}
  .preview p{margin:6px 0;color:#d1d5db}
  .preview code{background:#1e293b;color:#7dd3fc;padding:1px 5px;border-radius:3px;font-size:11px}
  .preview pre{background:#1e293b;color:#a5b4fc;padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:11px}
  .preview pre code{background:none;padding:0;font-size:inherit}
  .preview ul,.preview ol{padding-left:20px;color:#d1d5db;margin:6px 0}
  .preview a{color:#60a5fa;text-decoration:underline}
  .preview blockquote{border-left:3px solid #374151;padding-left:10px;color:#9ca3af;margin:8px 0}
  .preview table{border-collapse:collapse;width:100%;font-size:12px;margin:8px 0}
  .preview th,.preview td{border:1px solid #374151;padding:5px 8px}
  .preview th{background:#1f2937;color:#f3f4f6}
  .empty{color:#6b7280;font-size:12px;padding:16px;text-align:center}
</style>
</head>
<body>
<div class="toolbar">
  <span class="title">Markdown Preview</span>
  <div class="toggle">
    <span class="btn active" id="btnPreview" onclick="setMode('preview')">Preview</span>
    <span class="btn" id="btnSource" onclick="setMode('source')">Source</span>
  </div>
</div>
<div id="content" class="preview"><div class="empty">Waiting for content…</div></div>

<script>
let currentMd = "";
let mode = "preview";

function setMode(m) {
  mode = m;
  document.getElementById("btnPreview").className = "btn" + (m==="preview" ? " active" : "");
  document.getElementById("btnSource").className  = "btn" + (m==="source"  ? " active" : "");
  showContent();
}

function showContent() {
  const el = document.getElementById("content");
  if (!currentMd) { el.innerHTML = '<div class="empty">No content provided.</div>'; return; }
  if (mode === "preview") {
    el.className = "preview";
    el.innerHTML = marked.parse(currentMd);
  } else {
    el.className = "";
    el.innerHTML = `<div class="source">${escHtml(currentMd)}</div>`;
  }
  notifySize();
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function notifySize() {
  parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/size-changed",
    params:{height: document.body.scrollHeight + 16}}, "*");
}

// ── MCP bridge ───────────────────────────────────────────────────────────────
let _msgId = 1;
const _pending = new Map();

function sendRpc(method, params={}) {
  return new Promise(resolve => {
    const id = _msgId++;
    _pending.set(id, resolve);
    parent.postMessage({jsonrpc:"2.0", id, method, params}, "*");
  });
}

window.addEventListener("message", e => {
  const d = e.data;
  if (!d || d.jsonrpc !== "2.0") return;
  if (d.id != null && _pending.has(d.id)) { _pending.get(d.id)(d.result); _pending.delete(d.id); }
  if (d.method === "ui/notifications/tool-input") {
    const args = d.params?.arguments || {};
    currentMd = args.content || args.markdown || args.text || "";
    showContent();
  }
});

async function init() { await sendRpc("ui/initialize"); }
init();
</script>
</body>
</html>
