<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Visualizer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e5e7eb;padding:12px;min-height:100px}
  h3{font-size:13px;font-weight:600;margin-bottom:8px;color:#f3f4f6}
  .tabs{display:flex;gap:4px;margin-bottom:10px}
  .tab{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #374151;background:#1f2937;color:#9ca3af;transition:all .15s}
  .tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
  canvas{max-width:100%;border-radius:8px}
  .err{color:#f87171;font-size:12px;padding:8px}
  .empty{color:#6b7280;font-size:12px;padding:12px;text-align:center}
</style>
</head>
<body>
<div id="root"><div class="empty">Waiting for data…</div></div>
<script>
// ── MCP Apps postMessage bridge ────────────────────────────────────────────
let _msgId = 1;
const _pending = new Map();

function sendRpc(method, params={}) {
  return new Promise(resolve => {
    const id = _msgId++;
    _pending.set(id, resolve);
    parent.postMessage({jsonrpc:"2.0", id, method, params}, "*");
  });
}

window.addEventListener("message", e => {
  const d = e.data;
  if (!d || d.jsonrpc !== "2.0") return;
  if (d.id != null && _pending.has(d.id)) {
    _pending.get(d.id)(d.result);
    _pending.delete(d.id);
  }
  if (d.method === "ui/notifications/tool-input") {
    render(d.params?.arguments || {});
  }
});

// ── Rendering logic ─────────────────────────────────────────────────────────
let chartInstance = null;

const COLORS = [
  "#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6",
  "#06b6d4","#f97316","#84cc16","#ec4899","#6366f1"
];

function render(args) {
  const root = document.getElementById("root");
  const chartType = (args.chart_type || args.type || "bar").toLowerCase();
  const rawData = args.data;
  const title = args.title || "";

  if (!rawData) {
    root.innerHTML = '<div class="empty">No data provided.</div>';
    return;
  }

  // Parse the incoming data (object, array, or JSON string)
  let data;
  try {
    data = typeof rawData === "string" ? JSON.parse(rawData) : rawData;
  } catch {
    root.innerHTML = '<div class="err">Could not parse data. Provide an object or JSON string.</div>';
    return;
  }

  // Normalise to { labels, datasets }
  let labels, datasets;
  if (Array.isArray(data)) {
    labels = data.map((d, i) => d.label ?? d.name ?? `Item ${i+1}`);
    datasets = [{
      label: title || "Value",
      data: data.map(d => d.value ?? d.y ?? d),
      backgroundColor: COLORS,
      borderColor: COLORS,
    }];
  } else if (data.labels && data.datasets) {
    labels = data.labels;
    datasets = data.datasets;
  } else if (data.labels && data.values) {
    labels = data.labels;
    datasets = [{
      label: title || "Value",
      data: data.values,
      backgroundColor: COLORS,
      borderColor: COLORS,
    }];
  } else {
    labels = Object.keys(data);
    datasets = [{
      label: title || "Value",
      data: Object.values(data),
      backgroundColor: COLORS,
      borderColor: COLORS,
    }];
  }

  const tabs = ["bar","line","pie","doughnut"].map(t =>
    `<span class="tab${t===chartType?" active":""}" onclick="rerender('${t}')">${t}</span>`
  ).join("");

  root.innerHTML = `
    ${title ? `<h3>${title}</h3>` : ""}
    <div class="tabs">${tabs}</div>
    <canvas id="chart"></canvas>
  `;

  if (chartInstance) chartInstance.destroy();

  const isDoughnutOrPie = chartType === "pie" || chartType === "doughnut";
  chartInstance = new Chart(document.getElementById("chart"), {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#e5e7eb", font: { size: 11 } } } },
      scales: isDoughnutOrPie ? {} : {
        x: { ticks: { color: "#9ca3af" }, grid: { color: "#1f2937" } },
        y: { ticks: { color: "#9ca3af" }, grid: { color: "#1f2937" } },
      },
    },
  });
  notifySize();
}

window._lastArgs = {};
function rerender(type) {
  render({...window._lastArgs, chart_type: type});
}

function notifySize() {
  parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/size-changed",
    params:{height: document.body.scrollHeight + 20}}, "*");
}

// ── Initialize ───────────────────────────────────────────────────────────────
async function init() {
  await sendRpc("ui/initialize");
}
init();
</script>
</body>
</html>
