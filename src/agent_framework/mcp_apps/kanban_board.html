<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Task Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e4e4e7;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ────────────────────────────────────────────── */
  .header {
    padding: 13px 14px 11px;
    border-bottom: 1px solid #1e1e1e;
    flex-shrink: 0;
    background: #141414;
  }
  .header-top {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .header-icon { color: #818cf8; flex-shrink: 0; }
  .header-title { font-size: 13px; font-weight: 600; color: #fff; flex: 1; }
  .header-count { font-size: 11px; color: #52525b; }

  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-track {
    flex: 1; height: 3px; background: #242424; border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #6366f1, #818cf8);
    transition: width 0.55s cubic-bezier(.4,0,.2,1);
  }
  .progress-fill.all-done {
    background: linear-gradient(90deg, #16a34a, #22c55e);
  }
  .progress-pct { font-size: 11px; color: #52525b; min-width: 28px; text-align: right; }
  .progress-pct.all-done { color: #22c55e; }

  /* ── Empty state ────────────────────────────────────────── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: #3f3f46;
  }
  .empty-state p { font-size: 12px; }

  /* ── Board ──────────────────────────────────────────────── */
  .board { flex: 1; display: flex; overflow: hidden; }

  .col {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid #1a1a1a; overflow: hidden;
  }
  .col:last-child { border-right: none; }

  .col-head {
    padding: 9px 12px 8px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
    background: #111;
  }
  .col-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .col-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 20px; line-height: 1.6;
  }

  .col-todo .col-label  { color: #52525b; }
  .col-todo .col-badge  { background: #232323; color: #71717a; }
  .col-prog .col-label  { color: #d97706; }
  .col-prog .col-badge  { background: rgba(217,119,6,.15); color: #fbbf24; }
  .col-done .col-label  { color: #16a34a; }
  .col-done .col-badge  { background: rgba(22,163,74,.12); color: #4ade80; }

  .col-fail .col-label  { color: #dc2626; }
  .col-fail .col-badge  { background: rgba(220,38,38,.12); color: #f87171; }

  .col-body {
    flex: 1; overflow-y: auto; padding: 7px 6px;
    scrollbar-width: thin; scrollbar-color: #232323 transparent;
  }
  .col-body::-webkit-scrollbar { width: 3px; }
  .col-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ── Task cards ─────────────────────────────────────────── */
  .task-card {
    padding: 9px 10px; border-radius: 7px; margin-bottom: 5px;
    font-size: 12px; line-height: 1.45;
    display: flex; align-items: flex-start; gap: 6px;
  }
  .col-todo .task-card {
    background: #1a1a1a; color: #a1a1aa; border: 1px solid #252525;
  }
  .col-prog .task-card {
    background: rgba(217,119,6,.07); color: #fde68a;
    border: 1px solid rgba(217,119,6,.18);
  }
  .col-done .task-card {
    background: rgba(22,163,74,.05); color: #6ee7b7;
    border: 1px solid rgba(22,163,74,.12);
    opacity: .55; text-decoration: line-through;
  }

  .col-fail .task-card {
    background: rgba(220,38,38,.06); color: #fca5a5;
    border: 1px solid rgba(220,38,38,.18);
  }

  .card-dot {
    flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%;
    background: #f59e0b; margin-top: 4px;
    animation: dpulse 1.4s ease-in-out infinite;
  }
  @keyframes dpulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.3; transform:scale(.65); }
  }

  .card-check {
    flex-shrink: 0; width: 12px; height: 12px; margin-top: 1px; color: #4ade80;
  }
</style>
</head>
<body>

<!-- Empty state (shown until tasks arrive) -->
<div class="empty-state" id="empty">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="1.2" opacity=".2">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <line x1="9" y1="3" x2="9" y2="21"/>
    <line x1="15" y1="3" x2="15" y2="21"/>
  </svg>
  <p>Waiting for the agent to plan tasks…</p>
</div>

<!-- Header -->
<div class="header" id="hdr" style="display:none">
  <div class="header-top">
    <svg class="header-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="9" y1="3" x2="9" y2="21"/>
      <line x1="15" y1="3" x2="15" y2="21"/>
    </svg>
    <span class="header-title">Task Board</span>
    <span class="header-count" id="hdr-count"></span>
  </div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="pbar" style="width:0%"></div>
    </div>
    <span class="progress-pct" id="pct">0%</span>
  </div>
</div>

<!-- Board -->
<div class="board" id="board" style="display:none">
  <div class="col col-todo">
    <div class="col-head">
      <div class="col-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
        Todo<span class="col-badge" id="b-todo">0</span>
      </div>
    </div>
    <div class="col-body" id="c-todo"></div>
  </div>

  <div class="col col-prog">
    <div class="col-head">
      <div class="col-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <path d="M12 2a10 10 0 0 1 0 20"/>
          <path d="M12 2a10 10 0 0 0 0 20" opacity=".25"/>
        </svg>
        In Progress<span class="col-badge" id="b-prog">0</span>
      </div>
    </div>
    <div class="col-body" id="c-prog"></div>
  </div>

  <div class="col col-done">
    <div class="col-head">
      <div class="col-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="8,12 11,15 16,9"/>
        </svg>
        Done<span class="col-badge" id="b-done">0</span>
      </div>
    </div>
    <div class="col-body" id="c-done"></div>
  </div>

  <div class="col col-fail">
    <div class="col-head">
      <div class="col-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="8" y1="8" x2="16" y2="16"/>
          <line x1="16" y1="8" x2="8" y2="16"/>
        </svg>
        Failed<span class="col-badge" id="b-fail">0</span>
      </div>
    </div>
    <div class="col-body" id="c-fail"></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function makeCards(tasks, status) {
    return tasks
      .filter((t) => t.status === status)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
      .map((t) => {
        if (status === "in_progress") {
          return `<div class="task-card">
            <span class="card-dot"></span>
            <span>${esc(t.title)}</span>
          </div>`;
        }
        if (status === "done") {
          return `<div class="task-card">
            <svg class="card-check" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5">
              <polyline points="20,6 9,17 4,12"/>
            </svg>
            <span>${esc(t.title)}</span>
          </div>`;
        }
        if (status === "failed") {
          return `<div class="task-card">
            <svg class="card-check" viewBox="0 0 24 24" fill="none"
                 stroke="#f87171" stroke-width="2.5" style="color:#f87171">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            <span>${esc(t.title)}</span>
          </div>`;
        }
        return `<div class="task-card"><span>${esc(t.title)}</span></div>`;
      })
      .join("");
  }

  function render(list) {
    if (!list) return;
    const tasks  = list.tasks || [];
    const total  = tasks.length;
    const nDone  = tasks.filter((t) => t.status === "done").length;
    const nProg  = tasks.filter((t) => t.status === "in_progress").length;
    const nTodo  = tasks.filter((t) => t.status === "todo").length;
    const nFail  = tasks.filter((t) => t.status === "failed").length;
    const pct    = total > 0 ? Math.round((nDone / total) * 100) : 0;
    const allDone = total > 0 && nDone === total;

    document.getElementById("empty").style.display = "none";
    document.getElementById("hdr").style.display   = "";
    document.getElementById("board").style.display = "";

    document.getElementById("hdr-count").textContent = nDone + " / " + total + " done";

    const bar = document.getElementById("pbar");
    bar.style.width = pct + "%";
    bar.className   = "progress-fill" + (allDone ? " all-done" : "");

    const pctEl = document.getElementById("pct");
    pctEl.textContent = pct + "%";
    pctEl.className   = "progress-pct" + (allDone ? " all-done" : "");

    document.getElementById("b-todo").textContent = nTodo;
    document.getElementById("b-prog").textContent = nProg;
    document.getElementById("b-done").textContent = nDone;
    document.getElementById("b-fail").textContent = nFail;

    document.getElementById("c-todo").innerHTML = makeCards(tasks, "todo");
    document.getElementById("c-prog").innerHTML = makeCards(tasks, "in_progress");
    document.getElementById("c-done").innerHTML = makeCards(tasks, "done");
    document.getElementById("c-fail").innerHTML = makeCards(tasks, "failed");

    // Hide the Failed column when empty
    const failCol = document.querySelector(".col-fail");
    if (failCol) failCol.style.display = nFail > 0 ? "" : "none";
  }

  // ── Receive messages from parent ───────────────────────────
  window.addEventListener("message", (event) => {
    const msg = event.data;
    if (!msg || typeof msg !== "object") return;

    // AppPanel sends JSON-RPC ui/notifications/tool-input when ready
    // params.arguments = toolArguments = { task_list: {...} }
    if (
      msg.jsonrpc === "2.0" &&
      (msg.method === "ui/notifications/tool-input" ||
        msg.method === "update_context")
    ) {
      const tl =
        msg.params?.arguments?.task_list ||
        msg.params?.task_list;
      if (tl) render(tl);
      return;
    }

    // Fallback: legacy init_context / update_context non-RPC messages
    if (msg.type === "init_context" || msg.type === "update_context") {
      if (msg.task_list) render(msg.task_list);
    }
  });

  // Signal ready using JSON-RPC 2.0 so AppPanel's setIsReady(true) fires
  window.parent.postMessage({ jsonrpc: "2.0", id: 1, method: "ready" }, "*");
})();
</script>
</body>
</html>
