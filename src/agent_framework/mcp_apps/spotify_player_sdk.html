<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spotify Player</title>
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e5e7eb;min-height:80px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #1f2937}
  .title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:#1DB954}
  .dot.off{background:#6b7280}
  .status{font-size:10px;color:#6b7280}

  /* Now-playing bar */
  .now{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #1f2937;min-height:60px}
  .art{width:44px;height:44px;border-radius:5px;object-fit:cover;background:#1f2937;flex-shrink:0}
  .track-info{flex:1;min-width:0}
  .track-name{font-size:12px;font-weight:600;color:#f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-artist{font-size:11px;color:#9ca3af}

  /* Controls */
  .controls{display:flex;align-items:center;gap:8px;margin-top:6px}
  .btn{border:none;background:none;cursor:pointer;color:#9ca3af;padding:3px;border-radius:3px;transition:color .15s}
  .btn:hover{color:#f3f4f6}
  .btn.play-btn{background:#1DB954;color:#000;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px}
  .btn.play-btn:hover{background:#1ed760}
  .vol{display:flex;align-items:center;gap:5px;margin-left:auto}
  .vol input{width:60px;accent-color:#1DB954;cursor:pointer}
  .progress-wrap{padding:4px 12px 8px;display:flex;align-items:center;gap:8px}
  .progress-bar{flex:1;height:3px;background:#374151;border-radius:2px;cursor:pointer;position:relative}
  .progress-fill{height:100%;background:#1DB954;border-radius:2px;transition:width .5s linear;pointer-events:none}
  .prog-time{font-size:10px;color:#6b7280;font-family:monospace;white-space:nowrap}

  /* Queue */
  .queue{max-height:200px;overflow-y:auto}
  .q-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;transition:background .1s}
  .q-item:hover{background:#1f2937}
  .q-item.playing{background:#1a2f1a}
  .q-art{width:32px;height:32px;border-radius:3px;object-fit:cover;background:#1f2937;flex-shrink:0}
  .q-info{flex:1;min-width:0}
  .q-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .q-artist{font-size:10px;color:#9ca3af}
  .q-dur{font-size:10px;color:#6b7280;font-family:monospace}

  .empty{color:#6b7280;font-size:12px;padding:16px;text-align:center}
</style>
</head>
<body>
<div class="toolbar">
  <span class="title"><span class="dot off" id="sdkDot"></span>Spotify Player</span>
  <span class="status" id="status">Initializing…</span>
</div>

<div class="now" id="nowPlaying">
  <div class="empty" style="width:100%">No track loaded</div>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <span class="prog-time" id="elapsed">0:00</span>
  <div class="progress-bar" id="progressBar" onclick="seek(event)">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span class="prog-time" id="duration">0:00</span>
</div>

<div class="queue" id="queue"></div>

<script>
let player = null;
let accessToken = null;
let deviceId = null;
let tracks = [];
let currentIdx = 0;
let isPlaying = false;
let trackDuration = 0;
let trackPosition = 0;
let progressInterval = null;

// ── Spotify token & SDK ───────────────────────────────────────────────────────
async function getToken() {
  try {
    const r = await fetch("/api/spotify/token");
    if (!r.ok) throw new Error("Not authenticated");
    const j = await r.json();
    return j.access_token || j.token || null;
  } catch { return null; }
}

window.onSpotifyWebPlaybackSDKReady = async () => {
  accessToken = await getToken();
  if (!accessToken) { setStatus("Spotify not connected"); return; }
  document.getElementById("sdkDot").classList.remove("off");

  player = new Spotify.Player({
    name: "Agent Framework Player",
    getOAuthToken: cb => cb(accessToken),
    volume: 0.6
  });

  player.addListener("ready", ({ device_id }) => {
    deviceId = device_id;
    setStatus("Ready");
    if (tracks.length) playTrack(currentIdx);
  });
  player.addListener("player_state_changed", onStateChange);
  player.addListener("not_ready", () => setStatus("Device offline"));
  player.addListener("initialization_error", ({message}) => setStatus("Init error: "+message));
  player.addListener("authentication_error", ({message}) => setStatus("Auth error: "+message));
  player.addListener("account_error", () => setStatus("Premium required"));
  player.connect();
};

function onStateChange(state) {
  if (!state) return;
  isPlaying = !state.paused;
  trackDuration = state.duration;
  trackPosition = state.position;
  currentIdx = tracks.findIndex(t => t.uri && t.uri === state.track_window.current_track.uri);
  updateNowPlaying(state.track_window.current_track);
  updateProgress();
  renderQueue();
  if (isPlaying) startProgressTimer();
  else stopProgressTimer();
  notifyPlaybackState(state);
}

async function notifyPlaybackState(state) {
  const ct = state?.track_window?.current_track;
  await sendRpc("ui/update-model-context", {
    context: {
      playback: {
        is_playing: !state.paused,
        track: ct ? {name: ct.name, artist: ct.artists[0]?.name, id: ct.id} : null,
        position_ms: state.position,
        duration_ms: state.duration
      }
    }
  });
}

// ── Playback controls ─────────────────────────────────────────────────────────
async function playTrack(idx) {
  if (!deviceId || !tracks[idx]) return;
  const track = tracks[idx];
  if (!track.uri) return;
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
    method:"PUT",
    headers:{"Authorization":"Bearer "+accessToken,"Content-Type":"application/json"},
    body: JSON.stringify({uris:[track.uri]})
  });
}

function togglePlay() {
  if (!player) return;
  player.togglePlay();
}

function prevTrack() {
  if (!player) { currentIdx = Math.max(0, currentIdx-1); playTrack(currentIdx); return; }
  player.previousTrack();
}

function nextTrack() {
  if (!player) { currentIdx = Math.min(tracks.length-1, currentIdx+1); playTrack(currentIdx); return; }
  player.nextTrack();
}

function setVolume(v) {
  if (player) player.setVolume(v/100);
}

function seek(e) {
  if (!player || !trackDuration) return;
  const bar = document.getElementById("progressBar");
  const pct = e.offsetX / bar.offsetWidth;
  player.seek(Math.floor(pct * trackDuration));
}

function startProgressTimer() {
  stopProgressTimer();
  progressInterval = setInterval(() => {
    trackPosition = Math.min(trackPosition + 500, trackDuration);
    updateProgress();
  }, 500);
}

function stopProgressTimer() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

function updateProgress() {
  const pct = trackDuration ? (trackPosition / trackDuration * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("elapsed").textContent = fmtMs(trackPosition);
  document.getElementById("duration").textContent = fmtMs(trackDuration);
  document.getElementById("progressWrap").style.display = trackDuration ? "" : "none";
}

function fmtMs(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return m + ":" + String(s%60).padStart(2,"0");
}

// ── UI Rendering ──────────────────────────────────────────────────────────────
function updateNowPlaying(track) {
  const el = document.getElementById("nowPlaying");
  if (!track) { el.innerHTML='<div class="empty" style="width:100%">No track loaded</div>'; return; }
  const art = track.album?.images?.[0]?.url || "";
  el.innerHTML = `
    <img class="art" src="${art}" alt="art" onerror="this.src=''">
    <div class="track-info">
      <div class="track-name">${esc(track.name)}</div>
      <div class="track-artist">${esc(track.artists?.map(a=>a.name).join(", ")||"")}</div>
      <div class="controls">
        <button class="btn" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
        <button class="btn play-btn" id="playBtn" onclick="togglePlay()">${isPlaying?"&#9646;&#9646;":"&#9654;"}</button>
        <button class="btn" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
        <div class="vol">
          <span style="font-size:11px">&#128266;</span>
          <input type="range" min="0" max="100" value="60" oninput="setVolume(this.value)">
        </div>
      </div>
    </div>`;
  document.getElementById("progressWrap").style.display = "";
}

function renderFromTracks() {
  if (!tracks.length) { document.getElementById("nowPlaying").innerHTML='<div class="empty" style="width:100%">No tracks provided</div>'; return; }
  const t = tracks[currentIdx] || tracks[0];
  updateNowPlaying({
    name: t.name || t.title, id: t.id,
    artists: [{name: t.artist||t.artist_name||""}],
    album: { images: t.album_art ? [{url:t.album_art}] : [] }
  });
  renderQueue();
  notifySize();
}

function renderQueue() {
  const el = document.getElementById("queue");
  el.innerHTML = tracks.map((t,i) => `
    <div class="q-item ${i===currentIdx?"playing":""}" onclick="pickTrack(${i})">
      <img class="q-art" src="${t.album_art||""}" alt="" onerror="this.src=''">
      <div class="q-info">
        <div class="q-name">${esc(t.name||t.title||"Track "+(i+1))}</div>
        <div class="q-artist">${esc(t.artist||t.artist_name||"")}</div>
      </div>
      ${t.duration_ms ? `<span class="q-dur">${fmtMs(t.duration_ms)}</span>` : ""}
    </div>`).join("");
}

function pickTrack(idx) {
  currentIdx = idx;
  if (deviceId) playTrack(idx);
  else renderFromTracks();
}

function setStatus(s) { document.getElementById("status").textContent = s; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function notifySize() {
  setTimeout(() => parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/size-changed",
    params:{height: document.body.scrollHeight + 16}}, "*"), 0);
}

// ── MCP bridge ───────────────────────────────────────────────────────────────
let _msgId = 1;
const _pending = new Map();

function sendRpc(method, params={}) {
  return new Promise(resolve => {
    const id = _msgId++;
    _pending.set(id, resolve);
    parent.postMessage({jsonrpc:"2.0", id, method, params}, "*");
  });
}

window.addEventListener("message", e => {
  const d = e.data;
  if (!d || d.jsonrpc !== "2.0") return;
  if (d.id != null && _pending.has(d.id)) { _pending.get(d.id)(d.result); _pending.delete(d.id); }
  if (d.method === "ui/notifications/tool-input") {
    const args = d.params?.arguments || {};
    tracks = args.tracks || args.queue || [];
    currentIdx = 0;
    if (deviceId && tracks.length) playTrack(0);
    else renderFromTracks();
  }
});

async function init() { await sendRpc("ui/initialize"); }
init();
</script>
</body>
</html>
