# PodDisruptionBudgets — ensure minimum availability during voluntary disruptions
# (node drains, rolling upgrades, etc.)
---
# ── Edge Layer ────────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-bff
  namespace: af-edge
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway-bff
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend
  namespace: af-edge
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
