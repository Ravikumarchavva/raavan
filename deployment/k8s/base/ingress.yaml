# Production Ingress for microservices architecture
# Prerequisites:
#   - NGINX Ingress Controller: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.0/deploy/static/provider/cloud/deploy.yaml
#   - cert-manager: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.1/cert-manager.yaml
#   - DNS A record pointing your domain to the ingress LB IP
#
# To use without TLS (e.g. Kind + local dev), remove the TLS section and
# cert-manager annotation, and set ssl-redirect to "false".
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com  # CHANGE ME
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raavan-ingress
  namespace: af-edge
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: nginx
    # TLS via cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # SSL
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Timeouts (SSE streams need long timeouts)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # SSE support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.example.com  # CHANGE ME
      secretName: raavan-tls
  rules:
    - host: app.example.com  # CHANGE ME
      http:
        paths:
          # ── Backend API (Gateway BFF) ──
          # All /api/* routes go to the gateway
          - path: /threads
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          - path: /jobs
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          - path: /health
            pathType: Exact
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          - path: /hitl
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          - path: /stream
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: gateway-bff
                port:
                  number: 8001
          # ── Frontend (Next.js) — catch-all ──
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
