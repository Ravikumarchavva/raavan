# Frontend (Next.js) deployment for Kind cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: af-edge
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: prisma-migrate
          image: chatbot-frontend-kind:local
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres.af-data.svc.cluster.local:5432/chatbotdb
      containers:
        - name: frontend
          image: chatbot-frontend-kind:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: ""
            - name: BACKEND_API_URL
              value: http://gateway-bff.af-edge.svc.cluster.local:8001
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres.af-data.svc.cluster.local:5432/chatbotdb
            - name: NEXTAUTH_URL
              value: http://localhost
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-oauth-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-oauth-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              value: http://localhost/api/auth/google/callback
            - name: SPOTIFY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-oauth-secrets
                  key: SPOTIFY_CLIENT_ID
            - name: SPOTIFY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-oauth-secrets
                  key: SPOTIFY_CLIENT_SECRET
            - name: SPOTIFY_REDIRECT_URI
              value: http://localhost/api/spotify/callback
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: ENCRYPTION_KEY
                  optional: true
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: af-edge
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: http
      name: http
