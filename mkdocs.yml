site_name: Raavan Agent Framework
site_description: Production-ready Python framework for building autonomous AI agents with tool calling, memory management, and durable execution.
site_url: https://ravikumarchavva.github.io/raavan
repo_url: https://github.com/Ravikumarchavva/raavan
repo_name: Ravikumarchavva/raavan
edit_uri: edit/main/docs/
exclude_docs: |
  includes/

copyright: Copyright &copy; 2025–2026 Ravikumar Chavva

# ── Theme ────────────────────────────────────────────────────────────────────
theme:
  name: material
  logo: public/brand/raavan-mark.svg
  favicon: public/brand/raavan-mark.svg
  palette:
    # System-preference aware
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant        # SPA-style page loads
    - navigation.instant.progress
    - navigation.tracking       # URL updates on scroll
    - navigation.tabs           # top-level tabs
    - navigation.tabs.sticky
    - navigation.sections       # collapse-able sidebar sections
    - navigation.expand
    - navigation.indexes        # section index pages
    - navigation.top            # back-to-top button
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy         # copy button on code blocks
    - content.code.annotate     # inline code annotations
    - content.tabs.link         # synced content tabs
    - toc.follow
    - header.autohide

# ── Plugins ──────────────────────────────────────────────────────────────────
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            show_root_heading: true
            members_order: source
  - minify:
      minify_html: true

# ── Extensions ───────────────────────────────────────────────────────────────
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: Ravikumarchavva
      repo: raavan
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# ── Extra ─────────────────────────────────────────────────────────────────────
extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ravikumarchavva/raavan
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/raavan/
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_ID, ""]

# ── Navigation ────────────────────────────────────────────────────────────────
nav:
  - Home: index.md

  - Getting Started:
    - Overview: getting-started/index.md
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - First Durable Run: getting-started/first-runtime.md
    - Troubleshooting: getting-started/troubleshooting.md

  - Tutorials:
    - Overview: tutorials/index.md
    - Create A Tool: tutorials/create-tool.md
    - Add HITL Approval: tutorials/hitl-approval.md
    - Connect MCP Tools: tutorials/mcp-tools.md

  - Concepts:
    - Overview: concepts/index.md
    - Agent Lifecycle: concepts/agent-lifecycle.md
    - Tools And HITL: concepts/tools-and-hitl.md
    - Memory And Context: concepts/memory-and-context.md
    - Streaming And Events: concepts/streaming-and-events.md
    - Durable Runtime: concepts/durable-runtime.md

  - Core:
    - Runtime:
      - The Runtime: core/runtime/index.md
      - Scaling Out: core/runtime/scaling.md

  - Deploy:
    - Overview: deploy/index.md
    - Local And Kind: deploy/local-and-kind.md
    - Microservices: deploy/microservices.md

  - Operate:
    - Overview: operate/index.md
    - Observability: operate/observability.md
    - Runbook: operate/runbook.md

  - Reference:
    - Overview: reference/index.md
    - Configuration: reference/configuration.md
    - Events: reference/events.md
    - Message Model: reference/message-model.md

  - Architecture:
    - Overview: architecture/index.md
    - Diagrams: architecture/diagrams.md
    - Legacy Deep Dives: architecture/legacy-deep-dives.md

  - Examples: examples/index.md
  - Archive: archive/index.md

  - GitHub:
    - Repository: https://github.com/Ravikumarchavva/raavan
    - Notebooks: https://github.com/Ravikumarchavva/raavan/tree/main/examples
    - Frontend UI: https://github.com/Ravikumarchavva/raavan-ui
