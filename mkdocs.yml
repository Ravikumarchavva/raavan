  - Getting Started:
      - getting-started/index.md
      - Quick Start: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md

  - Core Concepts:
      - concepts/index.md
      - Architecture: concepts/architecture.md
      - ReAct Agent Loop: concepts/react-agent.md
      - Memory System: concepts/memory.md
      - Tool System: concepts/tools.md
      - Guardrails: concepts/guardrails.md
      - MCP Integration: concepts/mcp.md
      - SSE Streaming: concepts/sse-streaming.md

  - Durable Runtime:
      - runtime/index.md
      - Restate Integration: runtime/restate.md
      - Workflows: runtime/workflows.md
      - Activities: runtime/activities.md
      - Tool Policies: runtime/tool-policies.md

  - Tools Reference:
      - tools/index.md
      - Building a Tool: tools/building-a-tool.md
      - Human Input (HITL): tools/human-input.md
      - Task Manager: tools/task-manager.md
      - Web Surfer: tools/web-surfer.md
      - Code Interpreter: tools/code-interpreter.md

  - Deployment:
      - deployment/index.md
      - Monolith (local): deployment/monolith.md
      - Docker Compose: deployment/docker.md
      - Kubernetes (Kind): deployment/kubernetes.md
      - Microservices: deployment/microservices.md

  - Observability:
      - observability/index.md
      - Logging: observability/logging.md
      - Tracing (OpenTelemetry): observability/tracing.md
      - Grafana Dashboards: observability/grafana.md

  - Evaluation:
      - evals/index.md
      - Running Evals: evals/running.md
      - Custom Criteria: evals/criteria.md

  - Design Patterns:
      - design-patterns/index.md
      - Creational: design-patterns/creational.md
      - Structural: design-patterns/structural.md
      - Behavioral: design-patterns/behavioral.md

  - API Reference:
      - api/index.md
      - core.agents: api/core-agents.md
      - core.tools: api/core-tools.md
      - core.memory: api/core-memory.md
      - core.guardrails: api/core-guardrails.md
      - integrations.llm: api/integrations-llm.md
      - integrations.memory: api/integrations-memory.md
      - integrations.mcp: api/integrations-mcp.md

  - Changelog: changelog.md
