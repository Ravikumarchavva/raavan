site_name: Raavan Agent Framework
site_description: Production-ready Python framework for building autonomous AI agents with tool calling, memory management, and durable execution.
site_url: https://ravikumarchavva.github.io/raavan
repo_url: https://github.com/Ravikumarchavva/raavan
repo_name: Ravikumarchavva/raavan
edit_uri: edit/main/docs/
exclude_docs: |
  includes/

copyright: Copyright &copy; 2024–2026 Ravikumar Chavva

# ── Theme ────────────────────────────────────────────────────────────────────
theme:
  name: material
  logo: public/diagrams/ai-agent.svg
  favicon: public/diagrams/ai-agent.svg
  palette:
    # System-preference aware
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant        # SPA-style page loads
    - navigation.instant.progress
    - navigation.tracking       # URL updates on scroll
    - navigation.tabs           # top-level tabs
    - navigation.tabs.sticky
    - navigation.sections       # collapse-able sidebar sections
    - navigation.expand
    - navigation.indexes        # section index pages
    - navigation.top            # back-to-top button
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy         # copy button on code blocks
    - content.code.annotate     # inline code annotations
    - content.tabs.link         # synced content tabs
    - toc.follow
    - header.autohide

# ── Plugins ──────────────────────────────────────────────────────────────────
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            show_root_heading: true
            members_order: source
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true

# ── Extensions ───────────────────────────────────────────────────────────────
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: Ravikumarchavva
      repo: raavan
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# ── Extra ─────────────────────────────────────────────────────────────────────
extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ravikumarchavva/raavan
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/raavan/
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_ID, ""]

# ── Navigation ────────────────────────────────────────────────────────────────
nav:
  - Home: index.md

  - Architecture:
    - Distributed Architecture: DISTRIBUTED_ARCHITECTURE.md
    - Execution Pipeline: execution_pipeline.md
    - Distributed Runtime: DISTRIBUTED_RUNTIME.md
    - Architecture Diagrams: ARCHITECTURE_DIAGRAMS.md
    - Distributed Implementation Plan: DISTRIBUTED_IMPLEMENTATION_PLAN.md

  - Design And Operations:
    - Design Patterns: design_patterns.md
    - Future UI: FUTURE_UI.md
    - Operations: OPERATIONS.md

  - Microservices:
    - Overview: microservices/README.md
    - Topology And Service Catalog: microservices/01-topology-and-service-catalog.md
    - Role And Responsibility Matrix: microservices/02-role-and-responsibility-matrix.md
    - Data Ownership And Contract Standards: microservices/03-data-ownership-and-contract-standards.md
    - Implementation Waves: microservices/04-implementation-waves.md
