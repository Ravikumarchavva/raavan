apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: af-runtime
  labels:
    app: admin
    af.service-role: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        af.service-role: admin
    spec:
      serviceAccountName: admin
      containers:
        - name: admin
          image: ghcr.io/example/agent-framework/admin:0.1.0
          ports:
            - containerPort: 8019
              name: http
          envFrom:
            - secretRef:
                name: runtime-secrets
          env:
            - name: SERVICE_NAME
              value: admin
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: af-runtime
  labels:
    app: admin
spec:
  selector:
    app: admin
  ports:
    - port: 8019
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: af-runtime
