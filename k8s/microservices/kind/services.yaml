# Microservices Kind overlay — all services use local image, single replica, no HPA
# Skip code-interpreter (requires KVM), skip network policies (Kind)
---
# ── Namespaces ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: af-edge
  labels:
    app.kubernetes.io/part-of: agent-framework
---
apiVersion: v1
kind: Namespace
metadata:
  name: af-platform
  labels:
    app.kubernetes.io/part-of: agent-framework
---
apiVersion: v1
kind: Namespace
metadata:
  name: af-runtime
  labels:
    app.kubernetes.io/part-of: agent-framework
---
# ── Service Accounts ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-bff
  namespace: af-edge
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-auth
  namespace: af-platform
---
apiVersion: v1
kind: ServiceAccount
