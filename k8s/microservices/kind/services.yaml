---
# ══════════════════════════════════════════════════════════════════════════════
# af-edge: Gateway BFF
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-bff
  namespace: af-edge
  labels:
    app: gateway-bff
    af.service-role: gateway-bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-bff
  template:
    metadata:
      labels:
        app: gateway-bff
    spec:
      serviceAccountName: gateway-bff
      containers:
        - name: gateway-bff
          image: agent-microservices-kind:local
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "agent_framework.services.gateway.app:app",
                    "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - secretRef:
                name: shared-secrets
          env:
            - name: SERVICE_NAME
              value: gateway
            - name: IDENTITY_SERVICE_URL
              value: http://identity-auth.af-platform.svc.cluster.local:8010
            - name: POLICY_SERVICE_URL
              value: http://policy-authorization.af-platform.svc.cluster.local:8011
            - name: CONVERSATION_SERVICE_URL
              value: http://conversation.af-runtime.svc.cluster.local:8012
            - name: WORKFLOW_SERVICE_URL
              value: http://job-controller.af-runtime.svc.cluster.local:8013
            - name: HITL_SERVICE_URL
              value: http://human-gate.af-runtime.svc.cluster.local:8016
            - name: STREAM_SERVICE_URL
              value: http://live-stream.af-runtime.svc.cluster.local:8017
            - name: ARTIFACT_SERVICE_URL
              value: http://file-store.af-runtime.svc.cluster.local:8018
            - name: ADMIN_SERVICE_URL
              value: http://admin.af-runtime.svc.cluster.local:8019
            - name: CORS_ALLOWED_ORIGINS
              value: '["http://localhost","http://localhost:3000","http://localhost:3001","http://127.0.0.1:3000","http://frontend.af-edge.svc.cluster.local:3000"]'
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-bff
  namespace: af-edge
spec:
  selector:
    app: gateway-bff
  ports:
    - port: 8001
      targetPort: http
      name: http
---
