# ══════════════════════════════════════════════════════════════════════════
# Code Interpreter — isolated execution nodes
# Tool Executor → Code Interpreter: tool calls
# Agent Runtime → Code Interpreter: direct session management (optional)
# Gateway → Code Interpreter: /api/execute proxy
# Code Interpreter → no internal egress (VMs talk to vsock, not cluster)
# ══════════════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ci-ingress-from-runtime-and-edge
  namespace: af-runtime
spec:
  podSelector:
    matchLabels:
      app: code-interpreter
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - tool-executor
                  - agent-runtime
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              af.layer: edge
          podSelector:
            matchLabels:
              app: gateway-bff
      ports:
        - protocol: TCP
          port: 8080
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tool-executor-egress-to-ci
  namespace: af-runtime
spec:
  podSelector:
    matchLabels:
      app: tool-executor
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: code-interpreter
      ports:
        - protocol: TCP
          port: 8080
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tool-executor-egress-to-file-store
  namespace: af-runtime
spec:
  podSelector:
    matchLabels:
      app: tool-executor
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: file-store
      ports:
        - protocol: TCP
          port: 8018
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-egress-to-ci
  namespace: af-edge
spec:
  podSelector:
    matchLabels:
      app: gateway-bff
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              af.layer: runtime
          podSelector:
            matchLabels:
              app: code-interpreter
      ports:
        - protocol: TCP
          port: 8080
  policyTypes:
    - Egress

# ══════════════════════════════════════════════════════════════════════════
# Code Sandbox — strict egress lockdown
#
# gVisor intercepts all syscalls from user code, but the pod itself still
# has kernel-level network access. We lock it down here so that even if
# gVisor is somehow bypassed, user code cannot:
#   - Reach internal cluster services (agent-runtime, postgres, etc.)
#   - Make outbound HTTPS calls to exfiltrate data or hit the internet
#
# Allowed egress:
#   Redis   (6379) — session-affinity bindings (session_id → pod lookup)
#   Minio/S3 (9000/443) — presigned-URL file reads and artifact uploads
#   DNS     (53)   — covered by the allow-dns-egress policy above
#
# Everything else is blocked by the default-deny-all policy in af-runtime.
# ══════════════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-code-sandbox-egress-to-data-only
  namespace: af-runtime
spec:
  podSelector:
    matchLabels:
      app: code-interpreter
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              af.layer: data
      ports:
        - protocol: TCP
          port: 6379   # Redis — session bindings only
        - protocol: TCP
          port: 9000   # Object Storage (MinIO S3 API) — presigned reads + artifact writes
        - protocol: TCP
          port: 443    # Object Storage via HTTPS (S3-compatible external endpoint)
  policyTypes:
    - Egress
# NOTE: port 5432 (PostgreSQL) is intentionally excluded — Code Sandbox
# has no DB credentials and must never query application data directly.
# NOTE: port 80/443 to arbitrary hosts is intentionally excluded —
# user code cannot initiate outbound HTTP connections to the internet.

# ══════════════════════════════════════════════════════════════════════════
# Kafka (Event Bus) — egress from all service namespaces → af-data:9092
#
# Services publish to Kafka on the PLAINTEXT_INTERNAL listener (port 29092
# inside Docker Compose; mapped to 9092 in K8s via a ClusterIP Service).
# All three service namespaces need this egress rule.
# ══════════════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-edge-egress-to-kafka
  namespace: af-edge
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              af.layer: data
      ports:
        - protocol: TCP
          port: 9092
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-egress-to-kafka
  namespace: af-platform
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              af.layer: data
      ports:
        - protocol: TCP
          port: 9092
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-runtime-egress-to-kafka
  namespace: af-runtime
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              af.layer: data
      ports:
        - protocol: TCP
          port: 9092
  policyTypes:
    - Egress