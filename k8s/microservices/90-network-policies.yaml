# ══════════════════════════════════════════════════════════════════════════
# Default deny-all in each namespace
# ══════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: af-edge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: af-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: af-runtime
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# ══════════════════════════════════════════════════════════════════════════
# DNS egress — all namespaces need DNS resolution
# ══════════════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: af-edge
spec:
  podSelector: {}
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: af-platform
spec:
  podSelector: {}
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: af-runtime
spec:
  podSelector: {}
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  policyTypes:
    - Egress

# ══════════════════════════════════════════════════════════════════════════
# Gateway BFF → Platform services (Identity, Policy)
# ══════════════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-egress-to-platform
  namespace: af-edge
spec:
  podSelector:
    matchLabels:
      app: gateway-bff
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              af.layer: platform
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - identity-auth
                  - policy-authorization
      ports:
        - protocol: TCP
          port: 8010
        - protocol: TCP
          port: 8011
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress-from-external
  namespace: af-edge
spec:
  podSelector:
    matchLabels:
      app: gateway-bff
  ingress:
    - ports:
        - protocol: TCP
          port: 8001
  policyTypes:
    - Ingress

