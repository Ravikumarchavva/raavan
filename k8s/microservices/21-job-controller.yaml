apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-controller
  namespace: af-runtime
  labels:
    app: job-controller
    af.service-role: job-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-controller
  template:
    metadata:
      labels:
        app: job-controller
        af.service-role: job-controller
    spec:
      serviceAccountName: job-controller
      containers:
        - name: job-controller
          image: ghcr.io/example/agent-framework/job-controller:0.1.0
          ports:
            - containerPort: 8013
              name: http
          envFrom:
            - secretRef:
                name: runtime-secrets
          env:
            - name: SERVICE_NAME
              value: job-controller
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: job-controller
  namespace: af-runtime
  labels:
    app: job-controller
spec:
  selector:
    app: job-controller
  ports:
    - port: 8013
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-controller
  namespace: af-runtime
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-controller
  namespace: af-runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-controller
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
