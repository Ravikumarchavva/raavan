apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: af-runtime
  labels:
    app: agent-runtime
    af.service-role: agent-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
        af.service-role: agent-runtime
    spec:
      serviceAccountName: agent-runtime
      containers:
        - name: agent-runtime
          image: ghcr.io/example/agent-framework/agent-runtime:0.1.0
          ports:
            - containerPort: 8014
              name: http
          envFrom:
            - secretRef:
                name: runtime-secrets
          env:
            - name: SERVICE_NAME
              value: agent-runtime
            - name: CONVERSATION_SERVICE_URL
              value: http://conversation.af-runtime.svc.cluster.local:8012
            - name: MODEL_NAME
              value: gpt-4o
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: af-runtime
  labels:
    app: agent-runtime
spec:
  selector:
    app: agent-runtime
  ports:
    - port: 8014
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime
  namespace: af-runtime
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-runtime
  namespace: af-runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-runtime
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
