apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-authorization
  namespace: af-platform
  labels:
    app: policy-authorization
    af.service-role: policy-authorization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: policy-authorization
  template:
    metadata:
      labels:
        app: policy-authorization
        af.service-role: policy-authorization
    spec:
      serviceAccountName: policy-authorization
      containers:
        - name: policy-authorization
          image: ghcr.io/example/agent-framework/policy-authorization:0.1.0
          ports:
            - containerPort: 8011
              name: http
          envFrom:
            - secretRef:
                name: platform-secrets
          env:
            - name: SERVICE_NAME
              value: policy
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: policy-authorization
  namespace: af-platform
  labels:
    app: policy-authorization
spec:
  selector:
    app: policy-authorization
  ports:
    - port: 8011
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: policy-authorization
  namespace: af-platform
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: policy-authorization
  namespace: af-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: policy-authorization
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
