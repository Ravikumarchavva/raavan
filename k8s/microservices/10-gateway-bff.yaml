apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-bff
  namespace: af-edge
  labels:
    app: gateway-bff
    af.service-role: gateway-bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-bff
  template:
    metadata:
      labels:
        app: gateway-bff
        af.service-role: gateway-bff
    spec:
      serviceAccountName: gateway-bff
      containers:
        - name: gateway-bff
          image: ghcr.io/example/agent-framework/gateway-bff:0.1.0
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - secretRef:
                name: shared-secrets
          env:
            - name: SERVICE_NAME
              value: gateway
            - name: IDENTITY_SERVICE_URL
              value: http://identity-auth.af-platform.svc.cluster.local:8010
            - name: POLICY_SERVICE_URL
              value: http://policy-authorization.af-platform.svc.cluster.local:8011
            - name: CONVERSATION_SERVICE_URL
              value: http://conversation.af-runtime.svc.cluster.local:8012
            - name: WORKFLOW_SERVICE_URL
              value: http://workflow.af-runtime.svc.cluster.local:8013
            - name: HITL_SERVICE_URL
              value: http://hitl.af-runtime.svc.cluster.local:8016
            - name: STREAM_SERVICE_URL
              value: http://stream.af-runtime.svc.cluster.local:8017
            - name: ARTIFACT_SERVICE_URL
              value: http://artifact.af-runtime.svc.cluster.local:8018
            - name: CODE_INTERPRETER_SERVICE_URL
              value: http://code-interpreter.af-runtime.svc.cluster.local:8080
            - name: CORS_ALLOWED_ORIGINS
              value: "https://app.example.com"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-bff
  namespace: af-edge
  labels:
    app: gateway-bff
spec:
  selector:
    app: gateway-bff
  ports:
    - port: 8001
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-bff
  namespace: af-edge
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-bff
  namespace: af-edge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-bff
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
