---
# -- Grafana PVC --
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: af-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: agent-framework
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
# -- Grafana Deployment --
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: af-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: agent-framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/part-of: agent-framework
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.3.1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
# -- Grafana Service (port 3001 externally → 3000 container) --
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: af-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: agent-framework
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3001
      targetPort: 3000
      name: http

---
# =============================================================================
# 6. NODE EXPORTER — Host Metrics (DaemonSet)
# =============================================================================

# -- Node Exporter DaemonSet --
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: af-observability
  labels:
    app: node-exporter
    app.kubernetes.io/part-of: agent-framework
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
        app.kubernetes.io/part-of: agent-framework
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($$|/)
          ports:
            - containerPort: 9100
              name: metrics
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
---
# -- Node Exporter Service --
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: af-observability
  labels:
    app: node-exporter
    app.kubernetes.io/part-of: agent-framework
spec:
  type: ClusterIP
  selector:
    app: node-exporter
  ports:
    - port: 9100
      targetPort: 9100
      name: metrics
---
# =============================================================================
# 7. Grafana Ingress — accessible at http://localhost/grafana
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: af-observability
  labels:
    app.kubernetes.io/part-of: agent-framework
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3001
