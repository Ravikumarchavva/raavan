# =============================================================================
# Observability Stack for Agent Framework (Kind Cluster)
# =============================================================================
#
# Deploys into the af-observability namespace:
#   1. Loki        — Log aggregation (StatefulSet + ConfigMap + PVC + Service)
#   2. Promtail    — Log shipper (DaemonSet + RBAC + ConfigMap)
#   3. Tempo       — Distributed tracing (Deployment + ConfigMap + Service)
#   4. Prometheus  — Metrics collection (Deployment + RBAC + ConfigMap + PVC + Service)
#   5. Grafana     — Dashboards (Deployment + datasource/dashboard ConfigMaps + PVC + Service)
#   6. Node Exporter — Host metrics (DaemonSet + Service)
#
# Apply:
#   kubectl apply -f k8s/microservices/kind/observability.yaml
#
# All resource requests are conservative for single-node Kind clusters.
# =============================================================================

# =============================================================================
# 1. LOKI — Log Aggregation
# =============================================================================

# -- Loki configuration (single-tenant, local filesystem storage) --
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: af-observability
  labels:
    app: loki
    app.kubernetes.io/part-of: agent-framework
data:
  local-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2020-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        cache_location: /loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks

    ingester:
      wal:
        dir: /loki/wal

    limits_config:
      retention_period: 168h
      reject_old_samples: true
      reject_old_samples_max_age: 168h

    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      retention_enabled: true
---
# -- Loki StatefulSet --
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: af-observability
  labels:
    app: loki
    app.kubernetes.io/part-of: agent-framework
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        app.kubernetes.io/part-of: agent-framework
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          ports:
            - containerPort: 3100
              name: http
          args:
            - -config.file=/etc/loki/local-config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
---
# -- Loki Service --
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: af-observability
  labels:
    app: loki
    app.kubernetes.io/part-of: agent-framework
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
      name: http

---
# =============================================================================
# 2. PROMTAIL — Log Shipper (DaemonSet)
# =============================================================================

# -- Promtail ServiceAccount + RBAC for reading pod logs --
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: af-observability
  labels:
    app: promtail
    app.kubernetes.io/part-of: agent-framework
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app: promtail
    app.kubernetes.io/part-of: agent-framework
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app: promtail
    app.kubernetes.io/part-of: agent-framework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: af-observability
---
# -- Promtail configuration --
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: af-observability
  labels:
    app: promtail
    app.kubernetes.io/part-of: agent-framework
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.af-observability.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      # Discover all pods in af-* namespaces
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods in af-* namespaces
          - source_labels: [__meta_kubernetes_namespace]
            regex: af-.*
            action: keep
          # Use pod name as instance label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Extract namespace label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Extract container name label
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Extract the 'app' label from pod labels
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          # Extract the 'af.layer' label from pod labels
          - source_labels: [__meta_kubernetes_pod_label_af_layer]
            target_label: af_layer
          # Build the log file path from pod metadata
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log
        pipeline_stages:
          - docker: {}
          - labels:
              namespace:
              pod:
              container:
              app:
---
# -- Promtail DaemonSet --
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: af-observability
  labels:
    app: promtail
    app.kubernetes.io/part-of: agent-framework
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
        app.kubernetes.io/part-of: agent-framework
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods-log
              mountPath: /var/log/pods
              readOnly: true
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods-log
          hostPath:
            path: /var/log/pods
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers

---
# =============================================================================
# 3. TEMPO — Distributed Tracing
# =============================================================================

# -- Tempo configuration (OTLP receivers, local storage, metrics generator) --
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: af-observability
  labels:
    app: tempo
    app.kubernetes.io/part-of: agent-framework
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1_000_000
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 1h

    storage:
      trace:
        backend: local
        wal:
          path: /tmp/tempo/wal
        local:
          path: /tmp/tempo/blocks

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: kind
      storage:
        path: /tmp/tempo/generator/wal
        remote_write:
          - url: http://prometheus.af-observability.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
      processor:
        span_metrics:
          dimensions:
            - service.name
            - http.method
            - http.status_code
        service_graphs:
          dimensions:
            - service.name

    overrides:
      defaults:
        metrics_generator:
          processors:
            - span-metrics
            - service-graphs
---
# -- Tempo Deployment --
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: af-observability
  labels:
    app: tempo
    app.kubernetes.io/part-of: agent-framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
        app.kubernetes.io/part-of: agent-framework
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.3.1
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - containerPort: 3200
              name: http
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /tmp/tempo
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
---
# -- Tempo Service --
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: af-observability
  labels:
    app: tempo
    app.kubernetes.io/part-of: agent-framework
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
    - port: 3200
      targetPort: 3200
      name: http
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http

---
# =============================================================================
# 4. PROMETHEUS — Metrics Collection
# =============================================================================

# -- Prometheus ServiceAccount + RBAC for Kubernetes service discovery --
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: af-observability
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: af-observability
---
# -- Prometheus configuration (scrape + recording rules + alerting rules) --
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: af-observability
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/recording-rules.yml
      - /etc/prometheus/alerting-rules.yml

    scrape_configs:
      # --- Kubernetes Pods (annotation-based discovery) ---
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

      # --- Kubernetes Nodes (kubelet metrics) ---
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # --- cAdvisor (container resource metrics from kubelet) ---
      - job_name: kubernetes-cadvisor
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/cadvisor
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # --- Kubernetes Service Endpoints ---
      - job_name: kubernetes-service-endpoints
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: (.+)
            target_label: __address__
            replacement: $1
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service

      # --- kube-state-metrics style from kubelet ---
      - job_name: kubernetes-resource-metrics
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/resource
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # --- Tempo internal metrics ---
      - job_name: tempo-metrics
        static_configs:
          - targets:
              - tempo.af-observability.svc.cluster.local:3200

      # --- Loki internal metrics ---
      - job_name: loki-metrics
        static_configs:
          - targets:
              - loki.af-observability.svc.cluster.local:3100

      # --- Prometheus self-monitoring ---
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

  # ---- Recording Rules (pre-compute expensive queries) ----
  recording-rules.yml: |
    groups:
      - name: service_red_metrics
        interval: 15s
        rules:
          # Request rate per service (5m window)
          - record: service:http_requests:rate5m
            expr: sum by (app, namespace) (rate(http_requests_total[5m]))
          # Error rate per service (5m window)
          - record: service:http_errors:rate5m
            expr: sum by (app, namespace) (rate(http_requests_total{status=~"5.."}[5m]))
          # Error ratio per service
          - record: service:http_error_ratio:rate5m
            expr: |
              service:http_errors:rate5m
              / on(app, namespace) service:http_requests:rate5m
          # P50 latency per service
          - record: service:http_duration_seconds:p50
            expr: histogram_quantile(0.50, sum by (app, namespace, le) (rate(http_request_duration_seconds_bucket[5m])))
          # P95 latency per service
          - record: service:http_duration_seconds:p95
            expr: histogram_quantile(0.95, sum by (app, namespace, le) (rate(http_request_duration_seconds_bucket[5m])))
          # P99 latency per service
          - record: service:http_duration_seconds:p99
            expr: histogram_quantile(0.99, sum by (app, namespace, le) (rate(http_request_duration_seconds_bucket[5m])))

      - name: container_resource_metrics
        interval: 30s
        rules:
          # CPU usage per container (rate over 5m)
          - record: container:cpu_usage_seconds:rate5m
            expr: sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{container!=""}[5m]))
          # Memory usage per container
          - record: container:memory_working_set_bytes:avg
            expr: avg by (namespace, pod, container) (container_memory_working_set_bytes{container!=""})

      - name: cluster_health
        interval: 30s
        rules:
          # Running pods per namespace
          - record: namespace:kube_pod_running:count
            expr: count by (namespace) (kube_pod_status_phase{phase="Running"} == 1)
          # Total up targets
          - record: cluster:up:count
            expr: count(up == 1)

  # ---- Alerting Rules ----
  alerting-rules.yml: |
    groups:
      - name: service_alerts
        rules:
          # HIGH: Service completely down (no running pods)
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.app }} is down"
              description: "{{ $labels.app }} in {{ $labels.namespace }} has been unreachable for 1 minute."

          # HIGH: Elevated 5xx error rate (>5% of requests)
          - alert: HighErrorRate
            expr: service:http_error_ratio:rate5m > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.app }}"
              description: "{{ $labels.app }} error rate is {{ $value | humanizePercentage }} (>5%) for 2 minutes."

          # WARN: Elevated 5xx error rate (>1%)
          - alert: ElevatedErrorRate
            expr: service:http_error_ratio:rate5m > 0.01
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Elevated error rate on {{ $labels.app }}"
              description: "{{ $labels.app }} error rate is {{ $value | humanizePercentage }} (>1%) for 5 minutes."

          # HIGH: P99 latency >5s
          - alert: HighLatencyP99
            expr: service:http_duration_seconds:p99 > 5
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High P99 latency on {{ $labels.app }}"
              description: "{{ $labels.app }} P99 latency is {{ $value | humanizeDuration }} for 2 minutes."

          # WARN: P95 latency >2s
          - alert: HighLatencyP95
            expr: service:http_duration_seconds:p95 > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Elevated P95 latency on {{ $labels.app }}"
              description: "{{ $labels.app }} P95 latency is {{ $value | humanizeDuration }} for 5 minutes."

      - name: infrastructure_alerts
        rules:
          # HIGH: Node memory >90%
          - alert: NodeHighMemory
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node memory pressure"
              description: "Node memory usage is {{ $value | humanizePercentage }}."

          # WARN: Node memory >80%
          - alert: NodeMemoryWarning
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.80
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node memory elevated"
              description: "Node memory usage is {{ $value | humanizePercentage }}."

          # HIGH: Node CPU >90%
          - alert: NodeHighCPU
            expr: (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node CPU pressure"
              description: "Node CPU usage is {{ $value | humanizePercentage }}."

          # WARN: Node disk >85%
          - alert: NodeDiskPressure
            expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node disk filling up"
              description: "Root filesystem usage is {{ $value | humanizePercentage }}."

          # HIGH: Container OOM killed
          - alert: ContainerOOMKilled
            expr: increase(kube_pod_container_status_restarts_total[5m]) > 0 and on(pod) kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Container {{ $labels.container }} OOM killed"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOM killed."

          # WARN: Pod restarting frequently
          - alert: PodRestartingFrequently
            expr: increase(kube_pod_container_status_restarts_total[1h]) > 3
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} restarting frequently"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour."

          # HIGH: PVC nearly full
          - alert: PVCNearlyFull
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} nearly full"
              description: "PVC is {{ $value | humanizePercentage }} full."

      - name: observability_alerts
        rules:
          # WARN: Loki ingestion errors
          - alert: LokiIngestionErrors
            expr: rate(loki_distributor_lines_received_total[5m]) == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Loki not receiving logs"
              description: "Loki has not received any log lines for 10 minutes."

          # WARN: Tempo ingestion stopped
          - alert: TempoIngestionStopped
            expr: rate(tempo_distributor_spans_received_total[5m]) == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Tempo not receiving traces"
              description: "Tempo has not received any spans for 10 minutes."

          # WARN: Prometheus target down
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus target {{ $labels.job }} is down"
              description: "Target {{ $labels.instance }} in job {{ $labels.job }} has been down for 5 minutes."
---
# -- Prometheus PVC --
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: af-observability
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
# -- Prometheus Deployment --
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: af-observability
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/part-of: agent-framework
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.49.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-remote-write-receiver
            - --web.console.libraries=/etc/prometheus/console_libraries
            - --web.console.templates=/etc/prometheus/consoles
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
# -- Prometheus Service --
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: af-observability
  labels:
    app: prometheus
    app.kubernetes.io/part-of: agent-framework
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http

---
# =============================================================================
# 5. GRAFANA — Dashboards & Visualization
# =============================================================================

# -- Grafana datasource provisioning --
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: af-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: agent-framework
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.af-observability.svc.cluster.local:3100
        isDefault: false
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.af-observability.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.af-observability.svc.cluster.local:9090
        isDefault: true
---
# -- Grafana dashboard provider configuration --
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: af-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: agent-framework
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Agent Framework
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
# -- Grafana pre-provisioned dashboards --
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: af-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: agent-framework
data:
  # ═══════════════════════════════════════════════════════════════════════
  # Dashboard 1: Service RED Metrics (Rate / Errors / Duration)
  # ═══════════════════════════════════════════════════════════════════════
  service-red-metrics.json: |
    {
      "annotations": { "list": [{ "builtIn": 1, "datasource": { "type": "grafana", "uid": "-- Grafana --" }, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard" }] },
      "editable": true, "graphTooltip": 2, "id": null, "links": [],
      "panels": [
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "id": 50, "title": "Key Indicators", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 1 }, { "color": "green", "value": 5 }] } }, "overrides": [] },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 }, "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Services Up", "type": "stat",
          "targets": [{ "expr": "count(up{namespace=~\"af-.*\"} == 1)", "legendFormat": "up", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } }, "overrides": [] },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 }, "id": 2,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Services Down", "type": "stat",
          "targets": [{ "expr": "count(up{namespace=~\"af-.*\"} == 0) or vector(0)", "legendFormat": "down", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "reqps", "thresholds": { "steps": [{ "color": "blue", "value": null }] } }, "overrides": [] },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 }, "id": 3,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Total Request Rate", "type": "stat",
          "targets": [{ "expr": "sum(service:http_requests:rate5m) or vector(0)", "legendFormat": "req/s", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "percentunit", "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.01 }, { "color": "red", "value": 0.05 }] } }, "overrides": [] },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 }, "id": 4,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Global Error Rate", "type": "stat",
          "targets": [{ "expr": "sum(service:http_errors:rate5m) / sum(service:http_requests:rate5m) or vector(0)", "legendFormat": "err%", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "s", "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 5 }] } }, "overrides": [] },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 }, "id": 5,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Global P95 Latency", "type": "stat",
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) or vector(0)", "legendFormat": "p95", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 3 }] } }, "overrides": [] },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 }, "id": 6,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Active Alerts", "type": "stat",
          "targets": [{ "expr": "count(ALERTS{alertstate=\"firing\"}) or vector(0)", "legendFormat": "alerts", "refId": "A" }]
        },
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }, "id": 51, "title": "Request Rate by Service", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 15, "spanNulls": true } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 }, "id": 10,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "Request Rate (per service)", "type": "timeseries",
          "targets": [{ "expr": "service:http_requests:rate5m", "legendFormat": "{{ app }}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit", "max": 1, "custom": { "lineWidth": 2, "fillOpacity": 15, "spanNulls": true, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.05 }] } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 }, "id": 11,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "Error Rate (per service)", "type": "timeseries",
          "targets": [{ "expr": "service:http_error_ratio:rate5m", "legendFormat": "{{ app }}", "refId": "A" }]
        },
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 }, "id": 52, "title": "Latency by Service", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": true, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 2 }] } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 15 }, "id": 20,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean"] }, "tooltip": { "mode": "multi" } },
          "title": "P50 Latency", "type": "timeseries",
          "targets": [{ "expr": "service:http_duration_seconds:p50", "legendFormat": "{{ app }}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": true, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 2 }] } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 15 }, "id": 21,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean"] }, "tooltip": { "mode": "multi" } },
          "title": "P95 Latency", "type": "timeseries",
          "targets": [{ "expr": "service:http_duration_seconds:p95", "legendFormat": "{{ app }}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": true, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 5 }] } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 15 }, "id": 22,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean"] }, "tooltip": { "mode": "multi" } },
          "title": "P99 Latency", "type": "timeseries",
          "targets": [{ "expr": "service:http_duration_seconds:p99", "legendFormat": "{{ app }}", "refId": "A" }]
        },
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 }, "id": 53, "title": "Service Status Table", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "custom": { "align": "auto", "filterable": true } }, "overrides": [
            { "matcher": { "id": "byName", "options": "Status" }, "properties": [{ "id": "custom.cellOptions", "value": { "type": "color-background" } }, { "id": "mappings", "value": [{ "options": { "0": { "color": "red", "text": "DOWN" }, "1": { "color": "green", "text": "UP" } }, "type": "value" }] }] },
            { "matcher": { "id": "byName", "options": "Error Rate" }, "properties": [{ "id": "unit", "value": "percentunit" }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.01 }, { "color": "red", "value": 0.05 }] } }, { "id": "custom.cellOptions", "value": { "type": "color-background" } }] },
            { "matcher": { "id": "byName", "options": "Req/s" }, "properties": [{ "id": "unit", "value": "reqps" }] },
            { "matcher": { "id": "byName", "options": "P95 (s)" }, "properties": [{ "id": "unit", "value": "s" }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 5 }] } }, { "id": "custom.cellOptions", "value": { "type": "color-background" } }] }
          ] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 }, "id": 30,
          "options": { "showHeader": true, "sortBy": [{ "displayName": "Service", "desc": false }] },
          "title": "Service Health Matrix", "type": "table",
          "targets": [
            { "expr": "up{namespace=~\"af-.*\"}", "legendFormat": "{{ app }}", "refId": "Status", "format": "table", "instant": true },
            { "expr": "service:http_requests:rate5m", "legendFormat": "{{ app }}", "refId": "Rate", "format": "table", "instant": true },
            { "expr": "service:http_error_ratio:rate5m", "legendFormat": "{{ app }}", "refId": "Errors", "format": "table", "instant": true },
            { "expr": "service:http_duration_seconds:p95", "legendFormat": "{{ app }}", "refId": "P95", "format": "table", "instant": true }
          ],
          "transformations": [
            { "id": "merge" },
            { "id": "organize", "options": { "renameByName": { "app": "Service", "Value #Status": "Status", "Value #Rate": "Req/s", "Value #Errors": "Error Rate", "Value #P95": "P95 (s)" }, "excludeByName": { "Time": true, "namespace": true, "instance": true, "job": true, "__name__": true } } }
          ]
        }
      ],
      "schemaVersion": 39, "tags": ["agent-framework", "red", "sre"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Service RED Metrics",
      "uid": "af-service-red",
      "version": 1
    }

  # ═══════════════════════════════════════════════════════════════════════
  # Dashboard 2: Infrastructure & Resources
  # ═══════════════════════════════════════════════════════════════════════
  infrastructure.json: |
    {
      "annotations": { "list": [] }, "editable": true, "graphTooltip": 2, "id": null, "links": [],
      "panels": [
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "id": 50, "title": "Node Resources", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "percentunit", "max": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.7 }, { "color": "red", "value": 0.9 }] } }, "overrides": [] },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 }, "id": 1,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Node CPU Usage", "type": "stat",
          "targets": [{ "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))", "legendFormat": "cpu", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "percentunit", "max": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.7 }, { "color": "red", "value": 0.9 }] } }, "overrides": [] },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 1 }, "id": 2,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Node Memory Usage", "type": "stat",
          "targets": [{ "expr": "1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes", "legendFormat": "mem", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "percentunit", "max": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.7 }, { "color": "red", "value": 0.85 }] } }, "overrides": [] },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 1 }, "id": 3,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Root Disk Usage", "type": "stat",
          "targets": [{ "expr": "1 - node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"}", "legendFormat": "disk", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "bytes", "thresholds": { "steps": [{ "color": "blue", "value": null }] } }, "overrides": [] },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 1 }, "id": 4,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Total Memory", "type": "stat",
          "targets": [{ "expr": "node_memory_MemTotal_bytes", "legendFormat": "total", "refId": "A" }]
        },
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 }, "id": 51, "title": "Node Trends", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit", "max": 1, "custom": { "lineWidth": 2, "fillOpacity": 20, "thresholdsStyle": { "mode": "line+area" } }, "thresholds": { "steps": [{ "color": "transparent", "value": null }, { "color": "red", "value": 0.9 }] } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 7 }, "id": 10,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage Over Time", "type": "timeseries",
          "targets": [
            { "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))", "legendFormat": "total", "refId": "A" },
            { "expr": "avg(rate(node_cpu_seconds_total{mode=\"system\"}[5m]))", "legendFormat": "system", "refId": "B" },
            { "expr": "avg(rate(node_cpu_seconds_total{mode=\"user\"}[5m]))", "legendFormat": "user", "refId": "C" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 20 } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 7 }, "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Memory Usage Over Time", "type": "timeseries",
          "targets": [
            { "expr": "node_memory_MemTotal_bytes", "legendFormat": "total", "refId": "A" },
            { "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes", "legendFormat": "used", "refId": "B" },
            { "expr": "node_memory_Cached_bytes", "legendFormat": "cached", "refId": "C" },
            { "expr": "node_memory_Buffers_bytes", "legendFormat": "buffers", "refId": "D" }
          ]
        },
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 }, "id": 52, "title": "Container Resources", "type": "row" },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 10, "stacking": { "mode": "normal" } } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 }, "id": 20,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean"] }, "tooltip": { "mode": "multi" } },
          "title": "Container CPU Usage (cores)", "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=~\"af-.*\", container!=\"\"}[5m]))", "legendFormat": "{{ pod }}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "bytes", "custom": { "lineWidth": 1, "fillOpacity": 10, "stacking": { "mode": "normal" } } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 }, "id": 21,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean"] }, "tooltip": { "mode": "multi" } },
          "title": "Container Memory Usage", "type": "timeseries",
          "targets": [{ "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=~\"af-.*\", container!=\"\"})", "legendFormat": "{{ pod }}", "refId": "A" }]
