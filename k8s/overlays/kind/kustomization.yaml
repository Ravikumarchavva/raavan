# Kind cluster overlay — adapts production base for local development
#
# What this overlay does:
#   - Inherits all service manifests from ../../base
#   - Adds Kind-only resources: infra (Postgres/Redis), frontend, observability
#   - Overrides images to local tags (agent-microservices-kind:local)
#   - Adds uvicorn commands (single image, per-service entrypoint)
#   - Skips code-interpreter (requires KVM)
#   - Replaces production ingress with Kind-specific (no TLS)
#
# Usage:
#   kubectl apply -k k8s/overlays/kind/
#   OR
#   ./k8s/overlays/kind/deploy.ps1
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Production base manifests (all services, namespaces, policies)
  - ../../base
  # Kind-only resources
  - infra.yaml
  - frontend.yaml
  - observability.yaml
  # Kind ingress overrides production ingress (same resource name)
  - ingress.yaml

images:
  - name: ghcr.io/example/agent-framework/gateway-bff
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/identity-auth
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/policy-authorization
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/conversation
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/job-controller
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/agent-runtime
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/tool-executor
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/human-gate
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/live-stream
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/file-store
    newName: agent-microservices-kind
    newTag: local
  - name: ghcr.io/example/agent-framework/admin
    newName: agent-microservices-kind
    newTag: local

patches:
  # ── Set imagePullPolicy: IfNotPresent for service deployments ──
  - target:
      kind: Deployment
      name: gateway-bff
    patch: &pullpolicy-patch |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: identity-auth
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: policy-authorization
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: conversation
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: job-controller
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: agent-runtime
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: tool-executor
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: human-gate
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: live-stream
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: file-store
    patch: *pullpolicy-patch
  - target:
      kind: Deployment
      name: admin
    patch: *pullpolicy-patch

  # ── Add uvicorn commands (single image, per-service entrypoint) ──
  - target:
      kind: Deployment
      name: gateway-bff
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.gateway.app:app", "--host", "0.0.0.0", "--port", "8001"]
  - target:
      kind: Deployment
      name: identity-auth
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.identity.app:app", "--host", "0.0.0.0", "--port", "8010"]
  - target:
      kind: Deployment
      name: policy-authorization
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.policy.app:app", "--host", "0.0.0.0", "--port", "8011"]
  - target:
      kind: Deployment
      name: conversation
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.conversation.app:app", "--host", "0.0.0.0", "--port", "8012"]
  - target:
      kind: Deployment
      name: job-controller
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.job_controller.app:app", "--host", "0.0.0.0", "--port", "8013"]
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.agent_runtime.app:app", "--host", "0.0.0.0", "--port", "8014"]
  - target:
      kind: Deployment
      name: tool-executor
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.tool_executor.app:app", "--host", "0.0.0.0", "--port", "8015"]
  - target:
      kind: Deployment
      name: human-gate
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.human_gate.app:app", "--host", "0.0.0.0", "--port", "8016"]
  - target:
      kind: Deployment
      name: live-stream
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.live_stream.app:app", "--host", "0.0.0.0", "--port", "8017"]
  - target:
      kind: Deployment
      name: file-store
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.file_store.app:app", "--host", "0.0.0.0", "--port", "8018"]
  - target:
      kind: Deployment
      name: admin
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "agent_framework.services.admin.app:app", "--host", "0.0.0.0", "--port", "8019"]

  # ── Override CORS for Kind (localhost access via nginx-ingress on port 80) ──
  - target:
      kind: Deployment
      name: gateway-bff
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/9/value
        value: '["http://localhost","http://localhost:3000","http://localhost:3001","http://127.0.0.1:3000","http://frontend.af-edge.svc.cluster.local:3000"]'

  # ── Inject OTLP_ENDPOINT for backend services → Tempo in af-observability ──
  - target:
      kind: Deployment
      name: gateway-bff
    patch: &otlp-patch |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTLP_ENDPOINT
          value: "http://tempo.af-observability.svc.cluster.local:4318"
  - target:
      kind: Deployment
      name: identity-auth
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: policy-authorization
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: conversation
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: job-controller
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: agent-runtime
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: tool-executor
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: human-gate
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: live-stream
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: file-store
    patch: *otlp-patch
  - target:
      kind: Deployment
      name: admin
    patch: *otlp-patch

  # ── Remove file-store PVC (use emptyDir for Kind) ──
  - target:
      kind: Deployment
      name: file-store
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: file-store-data
          emptyDir: {}

  # ── Set HPA minReplicas=1 for Kind (single-node cluster, no memory for 2x each) ──
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1

  # ── Set Deployment replicas=1 for Kind (single-node, no surge capacity) ──
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # ── Set StatefulSet replicas=1 for Kind (covers code-interpreter) ──
  - target:
      kind: StatefulSet
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
