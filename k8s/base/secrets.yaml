# Secrets for services in af-edge namespace
# In production, use sealed-secrets, external-secrets-operator, or Vault
# This template shows required keys — values must be base64-encoded
apiVersion: v1
kind: Secret
metadata:
  name: shared-secrets
  namespace: af-edge
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres.af-data.svc.cluster.local:5432/agentdb"
  REDIS_URL: "redis://redis.af-data.svc.cluster.local:6379/0"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  OPENAI_API_KEY: "sk-CHANGE_ME"
---
