apiVersion: apps/v1
kind: Deployment
metadata:
  name: human-gate
  namespace: af-runtime
  labels:
    app: human-gate
    af.service-role: human-gate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: human-gate
  template:
    metadata:
      labels:
        app: human-gate
        af.service-role: human-gate
    spec:
      serviceAccountName: human-gate
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: human-gate
          image: ghcr.io/example/agent-framework/human-gate:0.1.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8016
              name: http
          envFrom:
            - secretRef:
                name: runtime-secrets
          env:
            - name: SERVICE_NAME
              value: human-gate
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: human-gate
  namespace: af-runtime
  labels:
    app: human-gate
spec:
  selector:
    app: human-gate
  ports:
    - port: 8016
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: human-gate
  namespace: af-runtime
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: human-gate
  namespace: af-runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: human-gate
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
