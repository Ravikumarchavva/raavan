apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation
  namespace: af-runtime
  labels:
    app: conversation
    af.service-role: conversation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conversation
  template:
    metadata:
      labels:
        app: conversation
        af.service-role: conversation
    spec:
      serviceAccountName: conversation
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: conversation
          image: ghcr.io/example/agent-framework/conversation:0.1.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8012
              name: http
          envFrom:
            - secretRef:
                name: runtime-secrets
          env:
            - name: SERVICE_NAME
              value: conversation
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: conversation
  namespace: af-runtime
  labels:
    app: conversation
spec:
  selector:
    app: conversation
  ports:
    - port: 8012
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: conversation
  namespace: af-runtime
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: conversation
  namespace: af-runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: conversation
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
