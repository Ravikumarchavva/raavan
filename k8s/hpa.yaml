apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-backend-hpa
  namespace: agent-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
      - type: Percent
        value: 50  # Scale down by max 50% at a time
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately
      policies:
      - type: Percent
        value: 100  # Double replicas at a time if needed
        periodSeconds: 15
      - type: Pods
        value: 4  # Or add 4 pods at a time
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-frontend-hpa
  namespace: agent-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
# HPA for Code Interpreter StatefulSet
#
# HOW SCALING WORKS WITH SESSION ROUTING:
#
#   StatefulSet pod names are always sequential: code-interpreter-0, -1, -2...
#   When HPA scales FROM 2 TO 3:
#     - code-interpreter-2 starts up (fresh, empty VM pool)
#     - Backend discovers it via k8s API (ready_pods list grows to 3)
#     - New threads hash to 3 slots; existing threads stay on their pod
#   When HPA scales DOWN from 3 to 2:
#     - k8s terminates the HIGHEST-index pod (code-interpreter-2) first
#     - preStop hook drains its active sessions (see code-interpreter-statefulset.yaml)
#     - Only after drain (or 300s timeout) does the pod die
#     - Threads that were hashed to pod-2 will get re-hashed on next call
#       (backend re-queries pod list and gets 2 pods)
#
# IMPORTANT: StatefulSet scale-down always removes highest-index pod first,
# which is exactly what you want \u2014 existing sessions on pod-0 and pod-1 survive.
#
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: code-interpreter-hpa
  namespace: agent-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: code-interpreter
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60   # each CI pod is CPU-heavy when running VMs
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # add pods quickly when load spikes
      policies:
      - type: Pods
        value: 1                        # add 1 pod at a time (each is expensive)
        periodSeconds: 60
    scaleDown:
      # Long stabilization: a sudden drop in CPU doesn't mean sessions are done.
      # The preStop drain handles graceful shutdown but we don't want to
      # aggressively scale down while VMs are still warming up on new pods.
      stabilizationWindowSeconds: 600   # 10 minutes before scale-down
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
