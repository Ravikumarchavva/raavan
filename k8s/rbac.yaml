# RBAC — ServiceAccounts and least-privilege Roles for each workload
#
# Why the backend needs pod-list access:
#   The code interpreter uses StatefulSet stable DNS:
#     code-interpreter-{N}.code-interpreter-headless.agent-framework.svc.cluster.local
#   The backend picks N = hash(thread_id) % replica_count so the SAME VM
#   pod is always used for a given conversation thread.
#   Instead of relying on the stale CI_REPLICAS configmap value, the backend
#   queries the k8s API to get the live replica count and readiness status.
#
# Python usage in the backend (add to tools/code_interpreter_tool.py):
#
#   from kubernetes import client, config
#   config.load_incluster_config()           # works automatically inside the pod
#   v1 = client.CoreV1Api()
#   pods = v1.list_namespaced_pod(
#       namespace="agent-framework",
#       label_selector="app=code-interpreter"
#   )
#   ready_pods = [p for p in pods.items if p.status.phase == "Running"]
#   n = len(ready_pods)
#   idx = int(hashlib.sha1(thread_id.encode()).hexdigest(), 16) % n
#   pod_name = ready_pods[idx].metadata.name
#   url = f"http://{pod_name}.code-interpreter-headless.agent-framework.svc.cluster.local:8080"
#

---
# ServiceAccount for the backend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-backend
  namespace: agent-framework

---
# ServiceAccount for the frontend (no special k8s access needed)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-frontend
  namespace: agent-framework

---
# ServiceAccount for the code-interpreter (no k8s API access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-code-interpreter
  namespace: agent-framework
  annotations:
    description: "Runs privileged Firecracker VMs; no k8s API access granted"

---
# Role: backend can read pods and statefulsets (for CI pod discovery only)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-pod-reader
  namespace: agent-framework
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
  # Only needs to see code-interpreter pods, but k8s Roles can't filter by label
  # — filter in application code with label_selector="app=code-interpreter"
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get"]
  resourceNames: ["code-interpreter"]   # scoped to exactly this StatefulSet

---
# Bind the Role to the backend ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-pod-reader-binding
  namespace: agent-framework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-pod-reader
subjects:
- kind: ServiceAccount
  name: agent-backend
  namespace: agent-framework
