apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-backend
  namespace: agent-framework
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: backend
          image: agent-backend-kind:local
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: REDIS_URL
            - name: OTLP_ENDPOINT
              value: ""
            - name: FRONTEND_URL
              value: "http://127.0.0.1:8000"
            - name: CORS_ALLOWED_ORIGINS
              value: '["http://127.0.0.1:8000", "http://localhost:8000"]'
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
